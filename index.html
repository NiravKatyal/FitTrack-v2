<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#0F0F0F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>FitTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0F0F;--surface:#1A1A1A;--surface2:#242424;--surface3:#2E2E2E;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F0F0F0;--muted:#888;--hint:#555;
  --accent:#C8F135;--accent-dim:rgba(200,241,53,0.12);--accent-text:#0F0F0F;
  --danger:#FF6B6B;--danger-dim:rgba(255,107,107,0.12);
  --warn:#FFB84D;--warn-dim:rgba(255,184,77,0.12);
  --info:#5BB8FF;--info-dim:rgba(91,184,255,0.12);
  --gym-pull:#5BB8FF;--gym-pull-bg:rgba(91,184,255,0.13);
  --gym-push:#9B8FFF;--gym-push-bg:rgba(155,143,255,0.13);
  --gym-legs:#4ED894;--gym-legs-bg:rgba(78,216,148,0.13);
  --run-long:#FFB84D;--run-long-bg:rgba(255,184,77,0.13);
  --run-speed:#FF7A5C;--run-speed-bg:rgba(255,122,92,0.13);
  --tennis:#FF9CE0;--tennis-bg:rgba(255,156,224,0.13);
  --swim:#4DD9E8;--swim-bg:rgba(77,217,232,0.13);
  --font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --r-md:8px;--r-lg:12px;--r-xl:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-d);-webkit-font-smoothing:antialiased;}
button{font-family:var(--font-d);cursor:pointer;}
input{font-family:var(--font-d);}

#app{display:flex;flex-direction:column;height:100%;width:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}

/* TOP BAR */
.topbar{padding:calc(var(--safe-top) + 14px) 20px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex:0 0 auto;z-index:10;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
.app-title span{color:var(--accent);}
.week-ctrl{display:flex;align-items:center;gap:10px;}
.wbtn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border2);background:none;color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.wbtn:active{background:var(--surface2);}
.week-label{font-family:var(--font-m);font-size:11px;color:var(--muted);letter-spacing:0.03em;}
.topbar-stats{display:flex;gap:8px;flex-wrap:wrap;}
.stat-chip{background:var(--surface);border-radius:20px;padding:4px 12px;font-family:var(--font-m);font-size:11px;color:var(--muted);}
.stat-chip b{color:var(--text);font-weight:500;}
.stat-chip.hi b{color:var(--accent);}

/* DAY STRIP */
.day-strip{display:flex;gap:4px;padding:10px 20px;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none;flex:0 0 auto;}
.day-strip::-webkit-scrollbar{display:none;}
.day-chip{flex:0 0 auto;min-width:46px;padding:8px 4px;border-radius:14px;text-align:center;cursor:pointer;border:0.5px solid transparent;background:none;transition:background 0.15s;}
.day-chip.active{background:var(--surface2);border-color:var(--border2);}
.day-chip.is-today .dc-num{color:var(--accent);}
.dc-name{font-family:var(--font-m);font-size:9px;color:var(--hint);display:block;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.dc-num{font-size:16px;font-weight:700;color:var(--muted);display:block;line-height:1;}
.day-chip.active .dc-num,.day-chip.active .dc-name{color:var(--text);}
.dc-pips{display:flex;gap:3px;justify-content:center;margin-top:5px;}
.dc-pip{width:4px;height:4px;border-radius:50%;background:var(--hint);}
.dc-pip.done{background:var(--accent);}
.dc-pip.pending{background:var(--border2);}

/* VIEWS */
.views{flex:1;overflow:hidden;position:relative;}
.view{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view::-webkit-scrollbar{display:none;}
.view.active{display:block;}
.scroll-pad{padding:14px 16px calc(var(--safe-bottom) + 80px);}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;padding:0 8px calc(var(--safe-bottom) + 8px);background:var(--bg);border-top:0.5px solid var(--border);display:flex;gap:2px;z-index:20;}
.nav-tab{flex:1;padding:10px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;border-radius:10px;transition:background 0.15s;}
.nav-tab.active .nav-icon,.nav-tab.active .nav-label{color:var(--accent);}
.nav-icon{font-size:18px;color:var(--hint);}
.nav-label{font-family:var(--font-m);font-size:9px;color:var(--hint);letter-spacing:0.04em;text-transform:uppercase;}

/* CARDS */
.act-card{background:var(--surface);border-radius:18px;border:0.5px solid var(--border);margin-bottom:10px;overflow:hidden;}
.act-card.done-card{opacity:0.55;}
.act-card.opt-card{border-style:dashed;background:transparent;}
.card-main{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;min-height:72px;}
.card-icon{width:46px;height:46px;border-radius:14px;flex:0 0 46px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-title.struck{text-decoration:line-through;color:var(--hint);}
.card-sub{font-family:var(--font-m);font-size:11px;color:var(--muted);margin-top:3px;}
.check-btn{width:44px;height:44px;border-radius:50%;flex:0 0 44px;border:1.5px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.check-btn svg{width:18px;height:18px;stroke:var(--hint);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.check-btn.checked{background:var(--accent);border-color:var(--accent);}
.check-btn.checked svg{stroke:var(--accent-text);}
.check-btn:active{transform:scale(0.93);}
.card-expand{border-top:0.5px solid var(--border);padding:14px;display:none;}
.card-expand.open{display:block;animation:fadeDown 0.18s ease;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* FORM ELEMENTS */
.field-block{margin-bottom:14px;}
.field-lbl{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
.field-row{display:flex;gap:8px;align-items:center;}
.fi{flex:1;min-width:0;background:var(--surface2);border:0.5px solid var(--border2);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.15s;}
.fi:focus{border-color:var(--accent);}
.field-unit{font-family:var(--font-m);font-size:11px;color:var(--hint);white-space:nowrap;}
.type-tog{display:flex;gap:6px;}
.type-tog button{flex:1;padding:9px 6px;border-radius:12px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:12px;font-weight:500;transition:all 0.15s;}
.type-tog button.active{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.ex-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.ex-row{display:flex;gap:6px;align-items:center;}
.ex-row input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;padding:9px 10px;font-size:13px;color:var(--text);outline:none;}
.ex-row input:focus{border-color:var(--accent);}
.ex-name{flex:3;}
.ex-num{flex:1;min-width:0;text-align:center;}
.ex-del{background:none;border:none;color:var(--hint);font-size:20px;padding:0 4px;line-height:1;}
.ex-hdr{display:grid;grid-template-columns:3fr 1fr 1fr 28px;gap:6px;margin-bottom:5px;}
.ex-hdr span{font-family:var(--font-m);font-size:9px;color:var(--hint);letter-spacing:0.05em;text-transform:uppercase;padding-left:2px;}
.add-ex{width:100%;border:0.5px dashed var(--border2);border-radius:10px;background:none;color:var(--muted);font-size:12px;padding:9px;}
.save-row{display:flex;gap:8px;margin-top:14px;}
.save-row button{flex:1;border-radius:14px;padding:12px;font-size:14px;font-weight:700;border:0.5px solid var(--border2);background:none;color:var(--muted);transition:all 0.15s;}
.save-row button:active{transform:scale(0.97);}
.btn-del{color:var(--danger);border-color:rgba(255,107,107,0.25);}
.btn-save{background:var(--accent);color:var(--accent-text);border-color:var(--accent);}

/* REST / ADD CARDS */
.rest-inner{display:flex;align-items:center;gap:14px;padding:16px;}
.rest-icon{font-size:24px;width:46px;text-align:center;}
.rest-text{font-size:14px;font-weight:700;color:var(--muted);}
.rest-sub{font-family:var(--font-m);font-size:11px;color:var(--hint);margin-top:3px;}
.add-act-btn{width:100%;border:1.5px dashed var(--border2);border-radius:18px;padding:16px;background:none;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:all 0.15s;}
.add-act-btn:active{border-color:var(--accent);color:var(--accent);}
.type-picker{background:var(--surface);border-radius:18px;border:0.5px solid var(--border2);padding:16px;margin-top:4px;}
.picker-title{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.picker-btn{border-radius:14px;padding:14px 10px;border:0.5px solid var(--border2);background:none;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.15s;}
.picker-btn:active{background:var(--surface2);}
.picker-icon{font-size:24px;}
.picker-label{font-size:13px;font-weight:700;color:var(--text);}
.picker-cancel{width:100%;margin-top:8px;border-radius:14px;padding:12px;border:0.5px solid var(--border);background:none;color:var(--hint);font-size:13px;}

/* ── CALORIE TAB ── */
.cal-header{padding:16px 16px 0;}
.cal-ring-wrap{display:flex;justify-content:center;align-items:center;padding:20px 0 16px;position:relative;}
.ring-svg{overflow:visible;}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:14;}
.ring-fill{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);}
.ring-center{position:absolute;text-align:center;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring-cal{font-size:28px;font-weight:800;color:var(--text);line-height:1;}
.ring-sub{font-family:var(--font-m);font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:0.04em;}
.ring-remain{font-size:13px;font-weight:500;margin-top:3px;}

.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 16px;}
.macro-card{background:var(--surface);border-radius:14px;padding:12px 10px;text-align:center;}
.macro-val{font-size:18px;font-weight:700;color:var(--text);}
.macro-lbl{font-family:var(--font-m);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
.macro-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:7px;overflow:hidden;}
.macro-bar{height:100%;border-radius:2px;transition:width 0.5s ease;}

.meal-section{padding:0 16px 10px;}
.meal-sect-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.meal-sect-title{font-family:var(--font-m);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.add-food-btn{font-size:12px;color:var(--accent);background:none;border:none;font-weight:500;}
.food-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:12px;margin-bottom:6px;}
.food-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.food-qty{font-family:var(--font-m);font-size:11px;color:var(--muted);}
.food-cal{font-family:var(--font-m);font-size:12px;font-weight:500;color:var(--accent);}
.food-del{background:none;border:none;color:var(--hint);font-size:16px;padding:0 2px;}
.food-macros{font-family:var(--font-m);font-size:10px;color:var(--hint);margin-top:2px;}

/* FOOD SEARCH MODAL */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-bottom)+20px);width:100%;max-height:85vh;display:flex;flex-direction:column;}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;}
.search-row{display:flex;gap:8px;margin-bottom:12px;}
.search-row input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;}
.search-row input:focus{border-color:var(--accent);}
.search-btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:12px;padding:11px 16px;font-size:13px;font-weight:700;}
.qty-row{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.qty-row input{width:80px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:12px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;text-align:center;}
.qty-row input:focus{border-color:var(--accent);}
.qty-lbl{font-family:var(--font-m);font-size:12px;color:var(--muted);}
.results-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.results-list::-webkit-scrollbar{display:none;}
.result-item{padding:12px;background:var(--surface2);border-radius:12px;cursor:pointer;border:0.5px solid transparent;transition:border-color 0.15s;}
.result-item.selected{border-color:var(--accent);}
.result-item:active{background:var(--surface3);}
.result-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.result-macros{font-family:var(--font-m);font-size:11px;color:var(--muted);}
.result-source{font-family:var(--font-m);font-size:10px;color:var(--hint);margin-top:2px;}
.search-status{font-family:var(--font-m);font-size:12px;color:var(--muted);text-align:center;padding:20px;}
.modal-add-btn{width:100%;background:var(--accent);color:var(--accent-text);border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;margin-top:12px;}
.modal-add-btn:disabled{opacity:0.35;}
.modal-cancel{width:100%;background:none;border:0.5px solid var(--border2);border-radius:14px;padding:12px;font-size:14px;color:var(--muted);margin-top:8px;}

/* HISTORY TAB */
.hist-week{margin-bottom:24px;}
.hist-week-title{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;padding-left:2px;}
.hist-day{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:14px;margin-bottom:6px;background:var(--surface);border:0.5px solid var(--border);}
.hd-date{font-family:var(--font-m);font-size:11px;color:var(--muted);width:56px;flex:0 0 56px;}
.hd-acts{flex:1;display:flex;gap:6px;flex-wrap:wrap;}
.act-pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}

/* STATS TAB */
.stats-section-title{font-family:var(--font-m);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;padding-left:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:16px 14px;}
.stat-card.hi{background:var(--accent-dim);border-color:rgba(200,241,53,0.2);}
.stat-card .sn{font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.stat-card.hi .sn{color:var(--accent);}
.stat-card .sl{font-family:var(--font-m);font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:0.04em;text-transform:uppercase;}
.abar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.abar-lbl{font-size:12px;font-weight:500;color:var(--text);width:70px;flex:0 0 70px;}
.abar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.abar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.abar-cnt{font-family:var(--font-m);font-size:11px;color:var(--muted);width:24px;text-align:right;}

/* GOAL / SETTINGS PANEL */
.goal-card{background:var(--surface);border-radius:18px;border:0.5px solid var(--border);padding:16px;margin-bottom:12px;}
.goal-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.goal-edit-btn{font-size:12px;color:var(--accent);background:none;border:none;font-weight:500;}
.goal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);}
.goal-row:last-child{border-bottom:none;}
.goal-key{font-family:var(--font-m);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;}
.goal-val{font-size:14px;font-weight:500;color:var(--text);}
.goal-val.accent{color:var(--accent);}
.progress-bar-wrap{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:12px;}
.progress-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 0.6s ease;}
.progress-lbl{display:flex;justify-content:space-between;margin-top:6px;}
.progress-lbl span{font-family:var(--font-m);font-size:10px;color:var(--muted);}
.calorie-breakdown{background:var(--surface);border-radius:18px;border:0.5px solid var(--border);padding:16px;margin-bottom:12px;}
.cb-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
.cb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);}
.cb-row:last-child{border-bottom:none;}
.cb-key{font-size:12px;color:var(--muted);}
.cb-val{font-family:var(--font-m);font-size:12px;font-weight:500;color:var(--text);}
.cb-val.accent{color:var(--accent);}

/* EDIT GOAL MODAL */
.edit-goal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-bottom)+20px);width:100%;display:flex;flex-direction:column;}
.edit-fi{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;margin-bottom:12px;}
.edit-fi:focus{border-color:var(--accent);}
.divider{height:0.5px;background:var(--border);margin:16px 0;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <div class="topbar-row1">
      <div class="app-title">Fit<span>Track</span></div>
      <div class="week-ctrl" id="week-ctrl">
        <button class="wbtn" onclick="shiftWeek(-1)">&#8592;</button>
        <span class="week-label" id="week-label"></span>
        <button class="wbtn" onclick="shiftWeek(1)">&#8594;</button>
      </div>
    </div>
    <div class="topbar-stats" id="topbar-stats"></div>
  </div>

  <div class="day-strip" id="day-strip"></div>

  <div class="views">
    <div id="view-today" class="view active">
      <div class="scroll-pad" id="cards-area"></div>
    </div>
    <div id="view-calories" class="view">
      <div id="cal-area"></div>
    </div>
    <div id="view-history" class="view">
      <div class="scroll-pad" id="history-area"></div>
    </div>
    <div id="view-stats" class="view">
      <div class="scroll-pad" id="stats-area"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" id="tab-today" onclick="switchView('today')">
      <span class="nav-icon">📅</span><span class="nav-label">Today</span>
    </button>
    <button class="nav-tab" id="tab-calories" onclick="switchView('calories')">
      <span class="nav-icon">🍽</span><span class="nav-label">Calories</span>
    </button>
    <button class="nav-tab" id="tab-history" onclick="switchView('history')">
      <span class="nav-icon">📋</span><span class="nav-label">History</span>
    </button>
    <button class="nav-tab" id="tab-stats" onclick="switchView('stats')">
      <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
    </button>
  </nav>

  <!-- Food Search Modal -->
  <div class="modal-overlay" id="food-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-meal-title">Add food</div>
      <div class="search-row">
        <input type="text" id="food-search-input" placeholder="Search Indian dishes, e.g. dal makhani…" />
        <button class="search-btn" onclick="searchFood()">Search</button>
      </div>
      <div class="qty-row">
        <input type="number" id="food-qty" value="100" min="1" />
        <span class="qty-lbl">grams &nbsp;|&nbsp; serving size</span>
      </div>
      <div class="results-list" id="food-results">
        <div class="search-status">Search for a food to see results</div>
      </div>
      <button class="modal-add-btn" id="modal-add-btn" onclick="addSelectedFood()" disabled>Add to log</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- Edit Goal Modal -->
  <div class="modal-overlay" id="goal-modal">
    <div class="edit-goal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Edit weight goal</div>
      <div class="field-lbl">Current weight (kg)</div>
      <input class="edit-fi" type="number" id="edit-current-weight" step="0.1" />
      <div class="field-lbl">Target weight (kg)</div>
      <input class="edit-fi" type="number" id="edit-target-weight" step="0.1" />
      <div class="field-lbl">Weeks to reach target</div>
      <input class="edit-fi" type="number" id="edit-weeks" min="1" max="52" />
      <div class="field-lbl">Height (cm)</div>
      <input class="edit-fi" type="number" id="edit-height" />
      <div class="field-lbl">Age</div>
      <input class="edit-fi" type="number" id="edit-age" />
      <button class="modal-add-btn" onclick="saveGoal()">Save &amp; recalculate</button>
      <button class="modal-cancel" onclick="closeGoalModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
const USDA_KEY='DEMO_KEY'; // Free demo key — works for moderate usage; user can replace with own key from https://fdc.nal.usda.gov/api-guide.html

// ─── STATE ───────────────────────────────────────────────
let weekOffset=0, selectedDay=(TODAY.getDay()+6)%7, expandedId=null, showPicker=false, currentView='today';
let modalMeal=null, selectedResult=null;

// ─── PERSISTENT STORE ────────────────────────────────────
function loadStore(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function saveStore(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// User profile & goals — recalculates calories automatically
let profile=loadStore('ft_profile',{
  sex:'male', age:28, height:169,
  currentWeight:90, targetWeight:85, weeksToGoal:8,
  activityMultiplier:1.55
});

// Food log keyed by date
let foodLog=loadStore('ft_food',{});
// Fitness activity store
let actStore=loadStore('ft_acts',{});

// ─── CALORIE CALCULATION (Mifflin-St Jeor) ───────────────
function calcBMR(weight){
  const p=profile;
  if(p.sex==='male') return 10*weight + 6.25*p.height - 5*p.age + 5;
  return 10*weight + 6.25*p.height - 5*p.age - 161;
}
function calcTDEE(weight){ return calcBMR(weight)*profile.activityMultiplier; }
function calcDailyTarget(){
  const w=profile.currentWeight, wt=profile.targetWeight, weeks=profile.weeksToGoal;
  const deficitPerDay=((w-wt)*7700)/(weeks*7);
  return Math.round(calcTDEE(w)-deficitPerDay);
}
function calcMacroTargets(cal){
  // Protein: 2g/kg (high for muscle retention), fat: 25% calories, carbs: remainder
  const protein=Math.round(profile.currentWeight*2);
  const fat=Math.round((cal*0.25)/9);
  const carbs=Math.round((cal-protein*4-fat*9)/4);
  return {protein,fat,carbs};
}

// ─── HELPERS ─────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9);}
function getMonday(ref){const d=new Date(ref);const diff=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function weekMon(){return getMonday(new Date(TODAY.getTime()+weekOffset*7*86400000));}
function dateKey(d){return d.toISOString().slice(0,10);}
function todayKey(){return dateKey(TODAY);}
function selectedDate(){const d=new Date(weekMon());d.setDate(d.getDate()+selectedDay);return d;}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}

// ─── FITNESS SCHEDULE ────────────────────────────────────
const GYM_CYCLE=['pull','push','legs'];
// Refined plan: Mon=flex, Tue=Pull, Wed=Speed run, Thu=Push, Fri=Long run, Sat=Legs, Sun=Swim
const TEMPLATE=[
  {type:'flex'},                              // Mon
  {type:'gym'},                               // Tue — Pull
  {type:'run',variant:'speed',opts:['swim']}, // Wed
  {type:'gym'},                               // Thu — Push
  {type:'run',variant:'long',opts:['swim']},  // Fri
  {type:'gym',opts:['tennis']},               // Sat — Legs
  {type:'swim',opts:['tennis']},              // Sun
];
const EX={
  pull:[{n:'Pull-ups',s:'',r:''},{n:'Lat pulldown',s:'',r:''},{n:'Cable row',s:'',r:''},{n:'Face pulls',s:'',r:''},{n:'Bicep curls',s:'',r:''}],
  push:[{n:'Bench press',s:'',r:''},{n:'Overhead press',s:'',r:''},{n:'Incline DB press',s:'',r:''},{n:'Lateral raises',s:'',r:''},{n:'Tricep dips',s:'',r:''}],
  legs:[{n:'Squats',s:'',r:''},{n:'Romanian deadlift',s:'',r:''},{n:'Leg press',s:'',r:''},{n:'Lunges',s:'',r:''},{n:'Calf raises',s:'',r:''}]
};

function gymPhase(mon){
  const base=new Date(2025,0,7); // Tuesday baseline
  const w=Math.round((mon-base)/(7*86400000));
  return GYM_CYCLE[((w%3)+3)%3];
}
function gymPhaseForDay(di,mon){
  // Tue=pull cycle, Thu=push (always push between pull and legs), Sat=legs
  const order={1:'pull',3:'push',5:'legs'};
  if(order[di]) return order[di];
  return gymPhase(mon);
}

function defaultActs(di,mon){
  const tpl=TEMPLATE[di]; const acts=[];
  if(tpl.type==='flex'){
    acts.push({id:uid(),type:'tennis',optional:true,done:false,d:{score:''}});
    acts.push({id:uid(),type:'run',variant:'long',optional:true,done:false,d:{dist:'',time:''}});
    return acts;
  }
  if(tpl.type==='gym'){
    const phase=gymPhaseForDay(di,mon);
    acts.push({id:uid(),type:'gym',phase,done:false,d:{exercises:EX[phase].map(e=>({...e}))}});
  } else if(tpl.type==='run'){
    acts.push({id:uid(),type:'run',variant:tpl.variant,done:false,d:{dist:'',time:''}});
  } else if(tpl.type==='swim'){
    acts.push({id:uid(),type:'swim',done:false,d:{laps:'',time:''}});
  }
  if(tpl.opts) tpl.opts.forEach(o=>{
    if(o==='tennis') acts.push({id:uid(),type:'tennis',optional:true,done:false,d:{score:''}});
    if(o==='swim') acts.push({id:uid(),type:'swim',optional:true,done:false,d:{laps:'',time:''}});
  });
  return acts;
}

function getDayData(date){
  const k=dateKey(date);
  if(!actStore[k]){
    const mon=getMonday(date);
    const di=(date.getDay()+6)%7;
    actStore[k]={activities:defaultActs(di,mon)};
  }
  return actStore[k];
}
function saveActs(){saveStore('ft_acts',actStore);}

// ─── ACTIVITY DISPLAY ─────────────────────────────────────
const COLS={
  'gym-pull':{c:'var(--gym-pull)',bg:'var(--gym-pull-bg)'},
  'gym-push':{c:'var(--gym-push)',bg:'var(--gym-push-bg)'},
  'gym-legs':{c:'var(--gym-legs)',bg:'var(--gym-legs-bg)'},
  'run-long':{c:'var(--run-long)',bg:'var(--run-long-bg)'},
  'run-speed':{c:'var(--run-speed)',bg:'var(--run-speed-bg)'},
  'tennis':{c:'var(--tennis)',bg:'var(--tennis-bg)'},
  'swim':{c:'var(--swim)',bg:'var(--swim-bg)'},
};
function actColKey(a){if(a.type==='gym')return'gym-'+(a.phase||'pull');if(a.type==='run')return'run-'+(a.variant||'long');return a.type;}
function actCols(a){return COLS[actColKey(a)]||{c:'var(--muted)',bg:'var(--surface2)'};}
const ICONS={gym:'🏋',run:'🏃',tennis:'🎾',swim:'🏊',rest:'😴'};
function actIcon(a){return ICONS[a.type]||'●';}
function actTitle(a){
  if(a.type==='gym')return'Gym · '+(a.phase.charAt(0).toUpperCase()+a.phase.slice(1)+' day');
  if(a.type==='run')return a.variant==='speed'?'Speed run':'Long run';
  if(a.type==='tennis')return a.optional?'Tennis — optional':'Tennis';
  if(a.type==='swim')return a.optional?'Swim — optional':'Swim';
  return'Rest day';
}
function actSub(a){
  if(a.type==='gym'&&a.d.exercises){const done=a.d.exercises.filter(e=>e.s||e.r).length;return done?`${done}/${a.d.exercises.length} exercises logged`:`${a.d.exercises.length} exercises planned`;}
  if(a.type==='run'&&a.d.dist)return`${a.d.dist} km · ${a.d.time||'—'}`;
  if(a.type==='swim'&&a.d.laps)return`${a.d.laps} laps · ${a.d.time||'—'}`;
  if(a.type==='tennis'&&a.d.score)return a.d.score;
  return a.optional?'Tap to log if you played':'Tap to log details';
}

// ─── MAIN RENDER ──────────────────────────────────────────
function render(){
  renderTopBar();
  renderDayStrip();
  if(currentView==='today') renderCards();
  else if(currentView==='calories') renderCalories();
  else if(currentView==='history') renderHistory();
  else if(currentView==='stats') renderStatsView();
}

function renderTopBar(){
  const mon=weekMon();
  const end=new Date(mon);end.setDate(end.getDate()+6);
  document.getElementById('week-label').textContent=fmtDate(mon)+' – '+fmtDate(end);
  const wc=document.getElementById('week-ctrl');
  const ts=document.getElementById('topbar-stats');
  if(currentView==='today'||currentView==='history'){
    wc.style.display='flex';
    let total=0,done=0;
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);getDayData(d).activities.forEach(a=>{if(a.type!=='rest'&&!a.optional){total++;if(a.done)done++;}});}
    const pct=total?Math.round(done/total*100):0;
    ts.innerHTML=`<div class="stat-chip"><b>${done}</b>/${total} done</div><div class="stat-chip${pct>=80?' hi':''}"><b>${pct}%</b> week</div>`;
  } else if(currentView==='calories'){
    wc.style.display='none';
    const target=calcDailyTarget();
    const consumed=getTodayCalories();
    const remain=target-consumed;
    ts.innerHTML=`<div class="stat-chip"><b>${consumed}</b> consumed</div><div class="stat-chip${remain<0?' hi':''}"><b>${Math.abs(remain)}</b> ${remain<0?'over':'remaining'}</div>`;
  } else {
    wc.style.display='none';ts.innerHTML='';
  }
}

function renderDayStrip(){
  const ds=document.getElementById('day-strip');
  if(currentView==='calories'||currentView==='stats'){ds.style.display='none';return;}
  ds.style.display='flex';ds.innerHTML='';
  const mon=weekMon();
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const isToday=d.getTime()===TODAY.getTime();
    const dd=getDayData(d);
    const nonRest=dd.activities.filter(a=>!a.optional);
    const chip=document.createElement('button');
    chip.className='day-chip'+(i===selectedDay?' active':'')+(isToday?' is-today':'');
    let pips='';
    nonRest.forEach(a=>{pips+=`<div class="dc-pip ${a.done?'done':'pending'}"></div>`;});
    chip.innerHTML=`<span class="dc-name">${DAYS[i]}</span><span class="dc-num">${d.getDate()}</span><div class="dc-pips">${pips}</div>`;
    chip.onclick=()=>{selectedDay=i;expandedId=null;showPicker=false;render();};
    ds.appendChild(chip);
  }
}

// ─── TODAY TAB ────────────────────────────────────────────
function renderCards(){
  const area=document.getElementById('cards-area');area.innerHTML='';
  const d=selectedDate();
  const dd=getDayData(d);
  if(showPicker){renderPicker(area,d);return;}

  // Monday label
  const di=(d.getDay()+6)%7;
  if(di===0){
    const note=document.createElement('div');
    note.style.cssText='font-family:var(--font-m);font-size:11px;color:var(--muted);padding:4px 2px 10px;';
    note.textContent='Flexible day — tennis if available, otherwise easy run or full rest';
    area.appendChild(note);
  }

  dd.activities.forEach(act=>{
    const cols=actCols(act);
    const card=document.createElement('div');
    card.className='act-card'+(act.done?' done-card':'')+(act.optional?' opt-card':'');
    const main=document.createElement('div');main.className='card-main';
    main.onclick=()=>{expandedId=(expandedId===act.id?null:act.id);renderCards();};
    const icon=document.createElement('div');icon.className='card-icon';
    icon.style.background=cols.bg;icon.textContent=actIcon(act);
    const body=document.createElement('div');body.className='card-body';
    body.innerHTML=`<div class="card-title${act.done?' struck':''}">${actTitle(act)}</div><div class="card-sub">${actSub(act)}</div>`;
    const cbtn=document.createElement('button');cbtn.className='check-btn'+(act.done?' checked':'');
    cbtn.innerHTML=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    cbtn.onclick=e=>{e.stopPropagation();act.done=!act.done;saveActs();render();};
    main.append(icon,body,cbtn);card.appendChild(main);
    const exp=document.createElement('div');exp.className='card-expand'+(expandedId===act.id?' open':'');
    if(expandedId===act.id)buildExpand(exp,act,d);
    card.appendChild(exp);area.appendChild(card);
  });

  const addBtn=document.createElement('button');addBtn.className='add-act-btn';
  addBtn.innerHTML='<span style="font-size:20px">＋</span> Add activity';
  addBtn.onclick=()=>{showPicker=true;render();};
  area.appendChild(addBtn);
}

function buildExpand(el,act,date){
  if(act.type==='gym') buildGym(el,act);
  else if(act.type==='run') buildRun(el,act);
  else if(act.type==='swim') buildSwim(el,act);
  else if(act.type==='tennis') buildTennis(el,act);
  const row=document.createElement('div');row.className='save-row';
  const del=document.createElement('button');del.className='btn-del';del.textContent='Remove';
  del.onclick=()=>{getDayData(date).activities=getDayData(date).activities.filter(a=>a.id!==act.id);saveActs();expandedId=null;render();};
  const sv=document.createElement('button');sv.className='btn-save';sv.textContent='Save ✓';
  sv.onclick=()=>{saveActs();expandedId=null;render();};
  row.append(del,sv);el.appendChild(row);
}

function fi(type,ph,val,cb,cls=''){
  const i=document.createElement('input');i.type=type;i.placeholder=ph;i.value=val||'';i.className='fi'+(cls?' '+cls:'');
  i.addEventListener('input',e=>cb(e.target.value));return i;
}
function fieldBlock(label,...children){
  const b=document.createElement('div');b.className='field-block';
  const l=document.createElement('div');l.className='field-lbl';l.textContent=label;
  const r=document.createElement('div');r.className='field-row';
  children.forEach(c=>{if(typeof c==='string'){const u=document.createElement('span');u.className='field-unit';u.textContent=c;r.appendChild(u);}else r.appendChild(c);});
  b.append(l,r);return b;
}

function buildGym(el,act){
  if(!act.d.exercises)act.d.exercises=[];
  const lbl=document.createElement('div');lbl.className='field-lbl';
  lbl.textContent=act.phase.charAt(0).toUpperCase()+act.phase.slice(1)+' day';
  el.appendChild(lbl);
  const hdr=document.createElement('div');hdr.className='ex-hdr';
  ['Exercise','Sets','Reps',''].forEach(t=>{const s=document.createElement('span');s.textContent=t;hdr.appendChild(s);});
  el.appendChild(hdr);
  const list=document.createElement('div');list.className='ex-list';
  function rl(){
    list.innerHTML='';
    act.d.exercises.forEach((ex,i)=>{
      const row=document.createElement('div');row.className='ex-row';
      const n=document.createElement('input');n.className='ex-name fi';n.placeholder='Exercise';n.value=ex.n||'';n.oninput=e=>act.d.exercises[i].n=e.target.value;
      const s=document.createElement('input');s.className='ex-num fi';s.type='number';s.placeholder='—';s.value=ex.s||'';s.oninput=e=>act.d.exercises[i].s=e.target.value;
      const r=document.createElement('input');r.className='ex-num fi';r.type='number';r.placeholder='—';r.value=ex.r||'';r.oninput=e=>act.d.exercises[i].r=e.target.value;
      const d=document.createElement('button');d.className='ex-del';d.textContent='×';d.onclick=()=>{act.d.exercises.splice(i,1);rl();};
      row.append(n,s,r,d);list.appendChild(row);
    });
    const add=document.createElement('button');add.className='add-ex';add.textContent='+ add exercise';
    add.onclick=()=>{act.d.exercises.push({n:'',s:'',r:''});rl();};
    list.appendChild(add);
  }
  rl();el.appendChild(list);
}

function buildRun(el,act){
  el.appendChild(fieldBlock('Distance',fi('number','e.g. 8',act.d.dist,v=>act.d.dist=v),'km'));
  el.appendChild(fieldBlock('Time',fi('text','mm:ss',act.d.time,v=>act.d.time=v)));
  const fb=document.createElement('div');fb.className='field-block';
  const lbl=document.createElement('div');lbl.className='field-lbl';lbl.textContent='Run type';
  const tog=document.createElement('div');tog.className='type-tog';
  ['long','speed'].forEach(v=>{
    const b=document.createElement('button');b.textContent=v==='long'?'Long run':'Speed run';
    if(act.variant===v)b.classList.add('active');
    b.onclick=()=>{act.variant=v;tog.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    tog.appendChild(b);
  });
  fb.append(lbl,tog);el.appendChild(fb);
}
function buildSwim(el,act){
  el.appendChild(fieldBlock('Laps',fi('number','e.g. 40',act.d.laps,v=>act.d.laps=v),'laps'));
  el.appendChild(fieldBlock('Time',fi('text','mm:ss',act.d.time,v=>act.d.time=v)));
}
function buildTennis(el,act){
  el.appendChild(fieldBlock('Score / result',fi('text','e.g. 6-4, 7-5',act.d.score,v=>act.d.score=v)));
}

function renderPicker(area,date){
  const p=document.createElement('div');p.className='type-picker';
  const t=document.createElement('div');t.className='picker-title';t.textContent='Add activity';
  const grid=document.createElement('div');grid.className='picker-grid';
  [{type:'gym',icon:'🏋',label:'Gym'},{type:'run',icon:'🏃',label:'Run'},{type:'tennis',icon:'🎾',label:'Tennis'},{type:'swim',icon:'🏊',label:'Swim'}].forEach(({type,icon,label})=>{
    const b=document.createElement('button');b.className='picker-btn';
    b.innerHTML=`<span class="picker-icon">${icon}</span><span class="picker-label">${label}</span>`;
    b.onclick=()=>{
      const act={id:uid(),type,done:false,d:{}};
      if(type==='gym'){act.phase=gymPhase(weekMon());act.d={exercises:EX[act.phase].map(e=>({...e}))};}
      if(type==='run'){act.variant='long';act.d={dist:'',time:''};}
      if(type==='swim'){act.d={laps:'',time:''};}
      if(type==='tennis'){act.d={score:''};}
      getDayData(date).activities.push(act);saveActs();showPicker=false;expandedId=act.id;render();
    };
    grid.appendChild(b);
  });
  const cancel=document.createElement('button');cancel.className='picker-cancel';cancel.textContent='Cancel';
  cancel.onclick=()=>{showPicker=false;render();};
  p.append(t,grid,cancel);area.appendChild(p);
}

// ─── CALORIES TAB ─────────────────────────────────────────
const MEALS=['Breakfast','Lunch','Dinner','Snacks'];

function getTodayFoodLog(){
  const k=todayKey();
  if(!foodLog[k])foodLog[k]={Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};
  return foodLog[k];
}
function saveFoodLog(){saveStore('ft_food',foodLog);}

function getTodayCalories(){
  const log=getTodayFoodLog();
  return Math.round(Object.values(log).flat().reduce((s,f)=>s+(f.calories||0),0));
}
function getTodayMacros(){
  const log=getTodayFoodLog();
  const items=Object.values(log).flat();
  return{
    protein:Math.round(items.reduce((s,f)=>s+(f.protein||0),0)),
    carbs:Math.round(items.reduce((s,f)=>s+(f.carbs||0),0)),
    fat:Math.round(items.reduce((s,f)=>s+(f.fat||0),0)),
  };
}

function renderCalories(){
  const area=document.getElementById('cal-area');area.innerHTML='';
  const target=calcDailyTarget();
  const consumed=getTodayCalories();
  const macros=getTodayMacros();
  const macroTargets=calcMacroTargets(target);
  const pct=Math.min(consumed/target,1);
  const remain=target-consumed;
  const over=remain<0;
  const r=80; const circ=2*Math.PI*r;
  const strokeColor=over?'var(--danger)':pct>0.85?'var(--warn)':'var(--accent)';
  const remainColor=over?'var(--danger)':pct>0.85?'var(--warn)':'var(--accent)';

  // Ring
  const ringWrap=document.createElement('div');ringWrap.className='cal-ring-wrap';
  ringWrap.innerHTML=`
    <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="${r}"/>
      <circle class="ring-fill" cx="100" cy="100" r="${r}"
        stroke="${strokeColor}"
        stroke-dasharray="${circ}"
        stroke-dashoffset="${circ*(1-pct)}"
        transform="rotate(-90 100 100)"/>
    </svg>
    <div class="ring-center">
      <div class="ring-cal">${consumed}</div>
      <div class="ring-sub">of ${target} kcal</div>
      <div class="ring-remain" style="color:${remainColor}">${over?'+'+Math.abs(remain)+' over':Math.abs(remain)+' left'}</div>
    </div>`;
  area.appendChild(ringWrap);

  // Macro bars
  const macroRow=document.createElement('div');macroRow.className='macro-row';
  [{key:'protein',label:'Protein',color:'#9B8FFF',unit:'g'},{key:'carbs',label:'Carbs',color:'#FFB84D',unit:'g'},{key:'fat',label:'Fat',color:'#FF7A5C',unit:'g'}].forEach(({key,label,color,unit})=>{
    const tgt=macroTargets[key];const val=macros[key];const p=Math.min(val/tgt,1);
    const c=document.createElement('div');c.className='macro-card';
    c.innerHTML=`<div class="macro-val">${val}<span style="font-size:12px;color:var(--muted)">/${tgt}${unit}</span></div><div class="macro-lbl">${label}</div><div class="macro-bar-wrap"><div class="macro-bar" style="width:${Math.round(p*100)}%;background:${color}"></div></div>`;
    macroRow.appendChild(c);
  });
  area.appendChild(macroRow);

  // Meals
  const log=getTodayFoodLog();
  MEALS.forEach(meal=>{
    const sec=document.createElement('div');sec.className='meal-section';
    const hdr=document.createElement('div');hdr.className='meal-sect-hdr';
    const mealCals=Math.round((log[meal]||[]).reduce((s,f)=>s+(f.calories||0),0));
    hdr.innerHTML=`<span class="meal-sect-title">${meal} ${mealCals?'· '+mealCals+' kcal':''}</span>`;
    const addBtn=document.createElement('button');addBtn.className='add-food-btn';addBtn.textContent='+ Add food';
    addBtn.onclick=()=>openModal(meal);
    hdr.appendChild(addBtn);sec.appendChild(hdr);
    (log[meal]||[]).forEach((food,idx)=>{
      const item=document.createElement('div');item.className='food-item';
      item.innerHTML=`
        <div style="flex:1;min-width:0">
          <div class="food-name">${food.name}</div>
          <div class="food-macros">P ${food.protein||0}g · C ${food.carbs||0}g · F ${food.fat||0}g &nbsp;·&nbsp; ${food.qty}g</div>
        </div>
        <div class="food-cal">${Math.round(food.calories)} kcal</div>
        <button class="food-del" onclick="deleteFood('${meal}',${idx})">×</button>`;
      sec.appendChild(item);
    });
    area.appendChild(sec);
  });

  // Goal summary card
  const gs=document.createElement('div');gs.style.cssText='padding:0 16px 16px;';
  gs.innerHTML=`
    <div class="goal-card">
      <div class="goal-card-title">Weight goal <button class="goal-edit-btn" onclick="openGoalModal()">Edit</button></div>
      <div class="goal-row"><span class="goal-key">Current weight</span><span class="goal-val">${profile.currentWeight} kg</span></div>
      <div class="goal-row"><span class="goal-key">Target weight</span><span class="goal-val">${profile.targetWeight} kg</span></div>
      <div class="goal-row"><span class="goal-key">To lose</span><span class="goal-val accent">${(profile.currentWeight-profile.targetWeight).toFixed(1)} kg</span></div>
      <div class="goal-row"><span class="goal-key">Timeframe</span><span class="goal-val">${profile.weeksToGoal} weeks</span></div>
      <div class="goal-row"><span class="goal-key">Daily target</span><span class="goal-val accent">${target} kcal</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.round(((profile.currentWeight-profile.targetWeight)/(profile.currentWeight-profile.targetWeight+(profile.currentWeight-profile.targetWeight)))*100)||50}%"></div></div>
    </div>`;

  // Calorie breakdown
  const tdee=Math.round(calcTDEE(profile.currentWeight));
  const deficit=tdee-target;
  gs.innerHTML+=`
    <div class="calorie-breakdown">
      <div class="cb-title">How your target is calculated</div>
      <div class="cb-row"><span class="cb-key">BMR (at rest)</span><span class="cb-val">${Math.round(calcBMR(profile.currentWeight))} kcal</span></div>
      <div class="cb-row"><span class="cb-key">TDEE (with training)</span><span class="cb-val">${tdee} kcal</span></div>
      <div class="cb-row"><span class="cb-key">Daily deficit needed</span><span class="cb-val">${deficit} kcal</span></div>
      <div class="cb-row"><span class="cb-key">Your daily target</span><span class="cb-val accent">${target} kcal</span></div>
      <div class="cb-row"><span class="cb-key">Expected loss/week</span><span class="cb-val">${((deficit*7)/7700).toFixed(2)} kg</span></div>
    </div>`;
  area.appendChild(gs);
}

function deleteFood(meal,idx){
  const log=getTodayFoodLog();
  log[meal].splice(idx,1);
  saveFoodLog();renderCalories();renderTopBar();
}

// ─── FOOD SEARCH MODAL ────────────────────────────────────
function openModal(meal){
  modalMeal=meal;selectedResult=null;
  document.getElementById('modal-meal-title').textContent='Add to '+meal;
  document.getElementById('food-results').innerHTML='<div class="search-status">Search for a food to see results</div>';
  document.getElementById('food-search-input').value='';
  document.getElementById('food-qty').value='100';
  document.getElementById('modal-add-btn').disabled=true;
  document.getElementById('food-modal').classList.add('open');
  setTimeout(()=>document.getElementById('food-search-input').focus(),300);
}
function closeModal(){document.getElementById('food-modal').classList.remove('open');selectedResult=null;}

async function searchFood(){
  const q=document.getElementById('food-search-input').value.trim();
  if(!q)return;
  const rl=document.getElementById('food-results');
  rl.innerHTML='<div class="search-status">Searching…</div>';
  selectedResult=null;document.getElementById('modal-add-btn').disabled=true;
  try{
    // USDA FoodData Central API — free, no auth needed with DEMO_KEY
    const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&dataType=Survey%20(FNDDS),SR%20Legacy,Foundation&pageSize=20&api_key=${USDA_KEY}`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('API error');
    const data=await res.json();
    const foods=(data.foods||[]).slice(0,12);
    if(!foods.length){rl.innerHTML='<div class="search-status">No results found. Try a different spelling.</div>';return;}
    rl.innerHTML='';
    foods.forEach(food=>{
      const getNutrient=(id)=>{const n=food.foodNutrients?.find(x=>x.nutrientId===id||x.nutrientNumber===String(id));return n?Math.round(n.value*10)/10:0;};
      const cal=getNutrient(1008)||getNutrient(2047)||0;
      const protein=getNutrient(1003)||0;
      const carbs=getNutrient(1005)||0;
      const fat=getNutrient(1004)||0;
      const item=document.createElement('div');item.className='result-item';
      item.innerHTML=`
        <div class="result-name">${food.description}</div>
        <div class="result-macros">${cal} kcal · P ${protein}g · C ${carbs}g · F ${fat}g <span style="color:var(--hint)">per 100g</span></div>
        <div class="result-source">${food.dataType||'USDA'} · ${food.brandOwner||''}</div>`;
      item.onclick=()=>{
        document.querySelectorAll('.result-item').forEach(x=>x.classList.remove('selected'));
        item.classList.add('selected');
        selectedResult={name:food.description,caloriesPer100:cal,proteinPer100:protein,carbsPer100:carbs,fatPer100:fat};
        document.getElementById('modal-add-btn').disabled=false;
      };
      rl.appendChild(item);
    });
  }catch(e){
    rl.innerHTML='<div class="search-status">Could not reach nutrition database. Check your connection.</div>';
  }
}

function addSelectedFood(){
  if(!selectedResult||!modalMeal)return;
  const qty=parseFloat(document.getElementById('food-qty').value)||100;
  const factor=qty/100;
  const log=getTodayFoodLog();
  log[modalMeal].push({
    name:selectedResult.name,
    qty:Math.round(qty),
    calories:Math.round(selectedResult.caloriesPer100*factor*10)/10,
    protein:Math.round(selectedResult.proteinPer100*factor*10)/10,
    carbs:Math.round(selectedResult.carbsPer100*factor*10)/10,
    fat:Math.round(selectedResult.fatPer100*factor*10)/10,
  });
  saveFoodLog();closeModal();renderCalories();renderTopBar();
}

// Allow Enter key to trigger search
document.getElementById('food-search-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchFood();});

// ─── GOAL EDIT MODAL ──────────────────────────────────────
function openGoalModal(){
  document.getElementById('edit-current-weight').value=profile.currentWeight;
  document.getElementById('edit-target-weight').value=profile.targetWeight;
  document.getElementById('edit-weeks').value=profile.weeksToGoal;
  document.getElementById('edit-height').value=profile.height;
  document.getElementById('edit-age').value=profile.age;
  document.getElementById('goal-modal').classList.add('open');
}
function closeGoalModal(){document.getElementById('goal-modal').classList.remove('open');}
function saveGoal(){
  profile.currentWeight=parseFloat(document.getElementById('edit-current-weight').value)||profile.currentWeight;
  profile.targetWeight=parseFloat(document.getElementById('edit-target-weight').value)||profile.targetWeight;
  profile.weeksToGoal=parseInt(document.getElementById('edit-weeks').value)||profile.weeksToGoal;
  profile.height=parseFloat(document.getElementById('edit-height').value)||profile.height;
  profile.age=parseInt(document.getElementById('edit-age').value)||profile.age;
  saveStore('ft_profile',profile);
  closeGoalModal();render();
}

// ─── HISTORY TAB ─────────────────────────────────────────
function renderHistory(){
  const area=document.getElementById('history-area');area.innerHTML='';
  for(let w=-3;w<=0;w++){
    const mon=getMonday(new Date(TODAY.getTime()+w*7*86400000));
    const end=new Date(mon);end.setDate(end.getDate()+6);
    const weekEl=document.createElement('div');weekEl.className='hist-week';
    const wl=document.createElement('div');wl.className='hist-week-title';
    wl.textContent=w===0?'This week':fmtDate(mon)+' – '+fmtDate(end);
    weekEl.appendChild(wl);
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(d.getDate()+i);
      if(d>TODAY)continue;
      const dd=getDayData(d);
      const nonRest=dd.activities.filter(a=>!a.optional);
      if(!nonRest.length)continue;
      const row=document.createElement('div');row.className='hist-day';
      const dt=document.createElement('div');dt.className='hd-date';dt.textContent=DAYS[i]+' '+d.getDate();
      const acts=document.createElement('div');acts.className='hd-acts';
      nonRest.forEach(a=>{
        const cols=actCols(a);
        const pill=document.createElement('div');pill.className='act-pill';
        pill.style.background=cols.bg;pill.style.color=cols.c;
        pill.textContent=(a.done?'✓ ':'')+actTitle(a).split(' · ')[0];
        acts.appendChild(pill);
      });
      // calorie summary for the day
      const k=dateKey(d);
      if(foodLog[k]){
        const cal=Math.round(Object.values(foodLog[k]).flat().reduce((s,f)=>s+(f.calories||0),0));
        if(cal>0){const cp=document.createElement('div');cp.className='act-pill';cp.style.cssText='background:var(--accent-dim);color:var(--accent);';cp.textContent=cal+' kcal';acts.appendChild(cp);}
      }
      row.append(dt,acts);weekEl.appendChild(row);
    }
    area.appendChild(weekEl);
  }
}

// ─── STATS TAB ───────────────────────────────────────────
function renderStatsView(){
  const area=document.getElementById('stats-area');area.innerHTML='';
  const counts={gym:0,run:0,tennis:0,swim:0};
  let totalDone=0,totalActs=0,runKm=0,swimLaps=0,totalCalories=0,loggedDays=0;
  Object.keys(actStore).forEach(k=>{
    actStore[k].activities.forEach(a=>{
      if(a.optional)return;
      totalActs++;
      if(a.done){totalDone++;counts[a.type]=(counts[a.type]||0)+1;
        if(a.type==='run'&&a.d.dist)runKm+=parseFloat(a.d.dist)||0;
        if(a.type==='swim'&&a.d.laps)swimLaps+=parseInt(a.d.laps)||0;
      }
    });
  });
  Object.keys(foodLog).forEach(k=>{
    const cal=Math.round(Object.values(foodLog[k]).flat().reduce((s,f)=>s+(f.calories||0),0));
    if(cal>0){totalCalories+=cal;loggedDays++;}
  });
  const avgCal=loggedDays?Math.round(totalCalories/loggedDays):0;
  const target=calcDailyTarget();

  const t=document.createElement('div');t.className='stats-section-title';t.textContent='All time';area.appendChild(t);
  const grid=document.createElement('div');grid.className='stats-grid';
  [{n:totalDone,l:'Activities done'},{n:Math.round(runKm*10)/10+'km',l:'Total distance run'},{n:swimLaps,l:'Laps swum'},{n:totalActs?Math.round(totalDone/totalActs*100)+'%':'-',l:'Completion rate',hi:true}]
  .forEach(({n,l,hi})=>{
    const c=document.createElement('div');c.className='stat-card'+(hi?' hi':'');
    c.innerHTML=`<div class="sn">${n}</div><div class="sl">${l}</div>`;grid.appendChild(c);
  });
  area.appendChild(grid);

  const t2=document.createElement('div');t2.className='stats-section-title';t2.textContent='Nutrition';area.appendChild(t2);
  const ng=document.createElement('div');ng.className='stats-grid';
  [{n:avgCal||'—',l:'Avg daily kcal',hi:avgCal>0&&Math.abs(avgCal-target)<150},{n:loggedDays,l:'Days logged'},{n:target,l:'Daily target'},{n:avgCal&&target?Math.round(avgCal/target*100)+'%':'—',l:'vs target'}]
  .forEach(({n,l,hi})=>{const c=document.createElement('div');c.className='stat-card'+(hi?' hi':'');c.innerHTML=`<div class="sn">${n}</div><div class="sl">${l}</div>`;ng.appendChild(c);});
  area.appendChild(ng);

  const t3=document.createElement('div');t3.className='stats-section-title';t3.textContent='By activity';area.appendChild(t3);
  const maxC=Math.max(...Object.values(counts),1);
  [{type:'gym',label:'Gym',color:'#9B8FFF'},{type:'run',label:'Run',color:'#FFB84D'},{type:'tennis',label:'Tennis',color:'#FF9CE0'},{type:'swim',label:'Swim',color:'#4DD9E8'}]
  .forEach(({type,label,color})=>{
    const c=counts[type]||0;
    const row=document.createElement('div');row.className='abar-row';
    row.innerHTML=`<div class="abar-lbl">${label}</div><div class="abar-track"><div class="abar-fill" style="width:${Math.round(c/maxC*100)}%;background:${color}"></div></div><div class="abar-cnt">${c}</div>`;
    area.appendChild(row);
  });

  // Weight goal progress
  const t4=document.createElement('div');t4.className='stats-section-title';t4.style.marginTop='16px';t4.textContent='Weight goal';area.appendChild(t4);
  const wc=document.createElement('div');wc.className='goal-card';
  const toLose=profile.currentWeight-profile.targetWeight;
  wc.innerHTML=`
    <div class="goal-row"><span class="goal-key">Start</span><span class="goal-val">${profile.currentWeight} kg</span></div>
    <div class="goal-row"><span class="goal-key">Target</span><span class="goal-val">${profile.targetWeight} kg</span></div>
    <div class="goal-row"><span class="goal-key">To go</span><span class="goal-val accent">${toLose.toFixed(1)} kg</span></div>
    <div class="goal-row"><span class="goal-key">Timeframe</span><span class="goal-val">${profile.weeksToGoal} weeks</span></div>
    <div style="margin-top:12px;"><button onclick="openGoalModal()" style="width:100%;border-radius:12px;padding:10px;border:0.5px solid var(--border2);background:none;color:var(--accent);font-size:13px;font-weight:700;">Update weight / goal</button></div>`;
  area.appendChild(wc);
}

// ─── VIEW SWITCHING ───────────────────────────────────────
function switchView(v){
  currentView=v;
  ['today','calories','history','stats'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('active',x===v);
    document.getElementById('tab-'+x).classList.toggle('active',x===v);
  });
  expandedId=null;showPicker=false;render();
}
function shiftWeek(dir){weekOffset+=dir;expandedId=null;showPicker=false;render();}

// ─── SERVICE WORKER ───────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

render();
</script>
